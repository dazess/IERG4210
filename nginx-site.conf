server {
    listen 80;
    server_name s77.ierg4210.iecuhk.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name s77.ierg4210.iecuhk.cc;

    ssl_certificate /etc/letsencrypt/live/s77.ierg4210.iecuhk.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s77.ierg4210.iecuhk.cc/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    server_tokens off;
    autoindex off;

    root /home/davidrcf525/IERG4210/dist;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.stripe.com; connect-src 'self' https://api.stripe.com https://r.stripe.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; form-action 'self' https://checkout.stripe.com;" always;

    location /api/ {
        proxy_pass http://unix:/home/davidrcf525/IERG4210/server/app.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location /uploads/ {
        proxy_pass http://unix:/home/davidrcf525/IERG4210/server/app.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 400 401 403 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
